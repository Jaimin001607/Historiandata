# Example Configuration for RMS Prognostics System
# Copy this file to config.yaml and customize for your environment

historian:
  type: custom_database
  connection_string: "your_database_connection_string_here"
  # Example formats:
  # - SQL Server: "mssql+pyodbc://user:password@server/database?driver=ODBC+Driver+17+for+SQL+Server"
  # - MySQL: "mysql://user:password@localhost/historian_db"
  # - PostgreSQL: "postgresql://user:password@localhost/historian_db"
  # - SQLite: "sqlite:///path/to/database.db"

monitoring:
  enabled: true
  interval_seconds: 60              # Run monitoring cycle every 60 seconds
  data_lookback_window: 300         # Sample last 5 minutes of data

alert:
  backend_url: "http://localhost:8000"
  enable_notifications: true

# Component definitions
# Each component has metrics that are monitored
components:
  
  PAFC_VALVE_01:
    description: "PAFC System - Valve 01"
    type: "valve"
    
    metrics:
      
      vibration_rms:
        tag_name: "PAFC.VALVE_01.VIBRATION"  # Historian tag name
        unit: "mm/s"
        warning: 50.0                         # Warning threshold
        critical: 75.0                        # Critical threshold
        
      pressure_variance:
        tag_name: "PAFC.VALVE_01.PRESSURE"
        unit: "psi"
        warning: 10.0
        critical: 20.0
        
      temperature_trend:
        tag_name: "PAFC.VALVE_01.TEMPERATURE"
        unit: "°C"
        warning: 70.0
        critical: 85.0
  
  PAFC_VALVE_02:
    description: "PAFC System - Valve 02"
    type: "valve"
    
    metrics:
      vibration_rms:
        tag_name: "PAFC.VALVE_02.VIBRATION"
        unit: "mm/s"
        warning: 50.0
        critical: 75.0
        
      pressure_variance:
        tag_name: "PAFC.VALVE_02.PRESSURE"
        unit: "psi"
        warning: 10.0
        critical: 20.0
  
  PAFC_VALVE_03:
    description: "PAFC System - Valve 03"
    type: "valve"
    
    metrics:
      vibration_rms:
        tag_name: "PAFC.VALVE_03.VIBRATION"
        unit: "mm/s"
        warning: 50.0
        critical: 75.0
        
      pressure_variance:
        tag_name: "PAFC.VALVE_03.PRESSURE"
        unit: "psi"
        warning: 10.0
        critical: 20.0

# Thresholds can be defined globally or per-component
# Component-level thresholds override global thresholds
thresholds:
  default_hysteresis_percent: 10.0  # Prevent alert flicker (hysteresis window)
  default_lookback_window_seconds: 300

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "prognostics.log"
